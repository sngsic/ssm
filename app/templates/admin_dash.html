<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <h1>Welcome to Admin Dashboard</h1>
    <div class="actions">
        <h2>Actions:</h2>

            {% endfor %}
        </ul>
    </div>
</body>
</html>
